# render.yaml — Render deployment configuration (place at repo root)
# Render auto-detects this file and configures the service.

services:
  - type: web
    name: banking-rag-chatbot-api
    runtime: python
    region: oregon
    plan: free

    rootDir: backend

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      # Set these manually in the Render dashboard — DO NOT commit real keys
      - key: GEMINI_API_KEY
        sync: false

      - key: GROQ_API_KEY
        sync: false

      - key: CHROMA_MODE
        value: local

      - key: CHROMA_PERSIST_DIR
        value: /var/data/chroma_db

      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2

      - key: CHUNK_SIZE
        value: "500"

      - key: CHUNK_OVERLAP
        value: "100"

      - key: TOP_K_RESULTS
        value: "5"

      - key: LOG_LEVEL
        value: INFO

      - key: ALLOWED_ORIGINS
        value: https://your-vercel-app.vercel.app

    # Uncomment below if you upgrade to a paid Render plan (persistent disk)
    # disk:
    #   name: chroma-data
    #   mountPath: /var/data
    #   sizeGB: 1
